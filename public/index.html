<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BattleBots.io</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="main-menu" class="menu visible">
    <h1>BattleBots.io</h1>
    <input id="player-name" placeholder="Enter your name" maxlength="12" />
    <select id="game-mode-select">
      <option value="Free For All">Free For All</option>
      <option value="Team Deathmatch">Team Deathmatch</option>
    </select>
    <div id="team-select-container" style="display:none;">
      <label><input type="radio" name="team" value="red" checked /> Red Team</label>
      <label><input type="radio" name="team" value="blue" /> Blue Team</label>
    </div>
    <button id="play-button">Play</button>
  </div>

  <div id="game-container" class="hidden">
    <canvas id="game-canvas" width="1600" height="900"></canvas>

    <div id="ui-overlay">
      <div id="health-bar">
        <div id="health-fill"></div>
      </div>
      <div id="scoreboard">Score: 0 | Coins: 0</div>
      <div id="leaderboard">
        <h3>Leaderboard</h3>
        <ul id="leaderboard-list"></ul>
      </div>
      <div id="upgrades-panel">
        <h3>Upgrades</h3>
        <button class="upgrade-btn" data-upgrade="damage">Damage</button>
        <button class="upgrade-btn" data-upgrade="bulletSpeed">Bullet Speed</button>
        <button class="upgrade-btn" data-upgrade="health">Health</button>
        <button class="upgrade-btn" data-upgrade="regen">Health Regen</button>
        <button class="upgrade-btn" data-upgrade="reload">Reload Speed</button>
      </div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
