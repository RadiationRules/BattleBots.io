<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Battlebots.io</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="mainMenu" style="
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.9); display: flex; justify-content:center; align-items:center; flex-direction: column; z-index: 100;
  ">
    <h1 style="color:#3498db; font-size: 4rem; margin-bottom: 20px;">Battlebots.io</h1>
    <button id="startBtn" style="
      padding: 15px 40px; font-size: 1.5rem; background:#2980b9; border:none; border-radius:10px; color:white; cursor:pointer;
    ">Start Game</button>
  </div>

  <div id="scoreboard">Score: 0</div>
  <canvas id="gameCanvas" width="900" height="700" style="display:none;"></canvas>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
