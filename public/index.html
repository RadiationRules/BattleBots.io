<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BattleBots.io</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="main-menu" class="menu active">
  <h1>BattleBots.io</h1>
  <input id="name-input" type="text" placeholder="Enter your name" maxlength="12" />
  <select id="team-select">
    <option value="neutral">Free For All</option>
    <option value="red">Red Team</option>
    <option value="blue">Blue Team</option>
  </select>
  <button id="play-btn">Play</button>
</div>

<div id="game-container" class="hidden">
  <canvas id="game-canvas" width="900" height="600"></canvas>

  <div id="gui">
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="score-coins">Score: 0 | Coins: 0</div>
    <button id="auto-fire-btn" title="Toggle Auto Fire (E)">Auto Fire: Off</button>
    <button id="upgrade-btn">Upgrades</button>
    <button id="chat-toggle-btn">Chat</button>
  </div>

  <div id="leaderboard" class="panel">
    <h3>Leaderboard</h3>
    <ul id="leaderboard-list"></ul>
  </div>

  <div id="upgrades-panel" class="panel hidden">
    <h3>Upgrades</h3>
    <div class="upgrade-row">
      <label>Damage</label>
      <button data-upgrade="damage">Upgrade (10 coins)</button>
    </div>
    <div class="upgrade-row">
      <label>Bullet Speed</label>
      <button data-upgrade="bulletSpeed">Upgrade (10 coins)</button>
    </div>
    <div class="upgrade-row">
      <label>Health</label>
      <button data-upgrade="health">Upgrade (10 coins)</button>
    </div>
    <div class="upgrade-row">
      <label>Health Regen</label>
      <button data-upgrade="healthRegen">Upgrade (10 coins)</button>
    </div>
    <div class="upgrade-row">
      <label>Reload Speed</label>
      <button data-upgrade="reloadSpeed">Upgrade (10 coins)</button>
    </div>
    <button id="close-upgrades">Close</button>
  </div>

  <div id="chat-panel" class="panel hidden">
    <div id="chat-messages"></div>
    <input id="chat-input" type="text" placeholder="Type a message and press Enter..." maxlength="150" />
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
