<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BattleBots.io</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas" width="1200" height="800"></canvas>

  <div id="ui">
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <ul></ul>
    </div>

    <div id="upgradesPanel">
      <h3>Upgrades</h3>
      <div class="upgrade" data-upgrade="damage">
        Damage: <span class="value">1</span>
        <button class="buyBtn">Buy (5 coins)</button>
      </div>
      <div class="upgrade" data-upgrade="bulletSpeed">
        Bullet Speed: <span class="value">1</span>
        <button class="buyBtn">Buy (5 coins)</button>
      </div>
      <div class="upgrade" data-upgrade="health">
        Health: <span class="value">100</span>
        <button class="buyBtn">Buy (10 coins)</button>
      </div>
      <div class="upgrade" data-upgrade="regen">
        Regen: <span class="value">0.01</span>
        <button class="buyBtn">Buy (10 coins)</button>
      </div>
      <div class="upgrade" data-upgrade="reloadSpeed">
        Reload Speed: <span class="value">300 ms</span>
        <button class="buyBtn">Buy (10 coins)</button>
      </div>
    </div>

    <div id="minimap"></div>
    <div id="coinsDisplay">Coins: 0</div>
    <div id="autofireToggle">Autofire: OFF (Press E)</div>
  </div>

  <div id="mainMenu">
    <h1>BattleBots.io</h1>
    <input id="playerNameInput" type="text" placeholder="Enter your BattleBot name" maxlength="15" autocomplete="off" />
    <button id="startGameBtn">Play</button>
  </div>

  <div id="popupMessage">
    <span id="popupText"></span>
    <button class="closeBtn" title="Close">&times;</button>
  </div>

  <div id="debugOverlay"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
