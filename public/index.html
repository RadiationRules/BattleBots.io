<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BattleBots.io - Polished with Menu and Popup</title>
<style>
  /* Reset and basics */
  * {
    margin: 0; padding: 0; box-sizing: border-box; user-select: none;
  }
  body, html {
    width: 100%; height: 100%; overflow: hidden;
    background: linear-gradient(135deg, #0d0d1a 0%, #1a1a33 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
  }
  #gameCanvas {
    display: block;
    margin: 0 auto;
    background: #0a0a1f url('https://i.imgur.com/LR8ehM6.png') repeat;
    border: 2px solid #333;
    border-radius: 12px;
    box-shadow: 0 0 20px #0af;
  }
  /* UI container on top of canvas */
  #ui {
    position: absolute;
    top: 20px; left: 20px;
    width: 350px;
    color: #eee;
    text-shadow: 0 0 5px #00f;
    user-select:none;
  }
  /* Leaderboard */
  #leaderboard {
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-weight: bold;
  }
  #leaderboard h3 {
    margin-bottom: 10px;
    font-size: 20px;
    text-align: center;
  }
  #leaderboard ul {
    list-style: none;
  }
  #leaderboard ul li {
    padding: 6px 8px;
    border-bottom: 1px solid #00aaffaa;
    font-size: 16px;
    display: flex;
    justify-content: space-between;
  }
  /* Upgrades Panel */
  #upgradesPanel {
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
  }
  #upgradesPanel h3 {
    margin-bottom: 10px;
    font-size: 20px;
    text-align: center;
  }
  .upgrade {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 16px;
    color: #ccf;
  }
  .upgrade .buyBtn {
    background: #00aaff;
    border: none;
    color: white;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
  }
  .upgrade .buyBtn:hover {
    background: #0077cc;
  }
  /* Minimap */
  #minimap {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 180px;
    height: 120px;
    background: rgba(0,0,0,0.7);
    border: 2px solid #00aaff;
    border-radius: 10px;
    box-shadow: 0 0 10px #00aaffaa;
  }
  /* Coins Display */
  #coinsDisplay {
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 15px;
    text-shadow: 0 0 10px #ffea00;
  }
  /* Autofire Toggle */
  #autofireToggle {
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    color: #55ff55;
    user-select: none;
    margin-bottom: 10px;
  }
  /* Main menu overlay */
  #mainMenu {
    position: fixed;
    top: 0; left: 0; right:0; bottom: 0;
    background: rgba(10,10,30,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
    color: #00aaff;
    text-align: center;
  }
  #mainMenu h1 {
    font-size: 48px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00aaff;
  }
  #mainMenu input[type="text"] {
    font-size: 24px;
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    width: 300px;
    max-width: 90vw;
    text-align: center;
    margin-bottom: 20px;
  }
  #mainMenu button {
    font-size: 24px;
    padding: 12px 30px;
    border-radius: 10px;
    border: none;
    background: #00aaff;
    color: white;
    cursor: pointer;
    transition: background 0.3s;
  }
  #mainMenu button:hover {
    background: #0077cc;
  }
  /* In-game popup message box */
  #popupMessage {
    position: fixed;
    top: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    border: 2px solid #00aaff;
    border-radius: 12px;
    padding: 20px 30px;
    max-width: 80vw;
    font-size: 20px;
    color: #00ffff;
    user-select: none;
    display: flex;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 1000;
  }
  #popupMessage.show {
    opacity: 1;
    pointer-events: auto;
  }
  #popupMessage button.closeBtn {
    margin-left: 20px;
    background: transparent;
    border: none;
    color: #00ffff;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    line-height: 1;
  }
</style>
</head>
<body>

  <canvas id="gameCanvas" width="1200" height="800"></canvas>

  <!-- UI container -->
  <div id="ui">
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <ul></ul>
    </div>

    <div id="upgradesPanel">
      <h3>Upgrades</h3>
      <div class="upgrade" data-upgrade="damage">
        Damage: <span class="value">1</span>
        <button class="buyBtn">Buy (5 coins)</button>
      </div>
      <div class="upgrade" data-upgrade="bulletSpeed">
        Bullet Speed: <span class="value">1</span>
        <button class="buyBtn">Buy (5 coins)</button>
      </div>
      <div class="upgrade" data-upgrade="health">
        Health: <span class="value">100</span>
        <button class="buyBtn">Buy (10 coins)</button>
      </div>
      <div class="upgrade" data-upgrade="regen">
        Regen: <span class="value">0.01</span>
        <button class="buyBtn">Buy (10 coins)</button>
      </div>
      <div class="upgrade" data-upgrade="reloadSpeed">
        Reload Speed: <span class="value">300 ms</span>
        <button class="buyBtn">Buy (10 coins)</button>
      </div>
    </div>

    <div id="minimap"></div>

    <div id="coinsDisplay">Coins: 0</div>

    <div id="autofireToggle">Autofire: OFF (Press E)</div>
  </div>

  <!-- Main menu overlay -->
  <div id="mainMenu">
    <h1>BattleBots.io</h1>
    <input id="playerNameInput" type="text" placeholder="Enter your BattleBot name" maxlength="15" autocomplete="off" />
    <button id="startGameBtn">Play</button>
  </div>

  <!-- Popup message -->
  <div id="popupMessage">
    <span id="popupText"></span>
    <button class="closeBtn" title="Close">&times;</button>
  </div>

<script>
(() => {
  // --- Setup Canvas ---
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const WIDTH = canvas.width;
  const HEIGHT = canvas.height;

  // --- Game constants ---
  const MAP_WIDTH = 2000;
  const MAP_HEIGHT = 1400;

  const PLAYER_RADIUS = 30;
  const PLAYER_MAX_HEALTH_BASE = 100;
  const PLAYER_REGEN_BASE = 0.01;
  const PLAYER_SPEED_BASE = 4;
  const PLAYER_DAMAGE_BASE = 20;
  const PROJECTILE_SPEED_BASE = 12;
  const SHOOT_COOLDOWN_BASE = 300; // ms

  const BOT_RADIUS = 30;
  const BOT_SPEED = 2;
  const BOT_SHOOT_COOLDOWN = 1200; // bots shoot slower (nerfed 50%)

  const COIN_RADIUS = 12;
  const CHEST_COINS = [10, 25];

  const UPGRADE_COSTS = {
    damage: 5,
    bulletSpeed: 5,
    health: 10,
    regen: 10,
    reloadSpeed: 10,
  };

  const BOT_NAMES = [
    "Sliker", "Tung Sahur", "YourMom", "ZeroCool", "Botinator",
    "Alpha", "Glitch", "Nano", "Cypher", "MechX", "Shadow", "Vortex"
  ];

  // --- Game state ---
  let keys = {};
  let mousePos = { x: WIDTH / 2, y: HEIGHT / 2 };
  let mouseDown = false;
  let autofire = false;
  let gameRunning = false;

  // Player object
  let player = {
    name: '',
    x: MAP_WIDTH / 2,
    y: MAP_HEIGHT / 2,
    radius: PLAYER_RADIUS,
    health: PLAYER_MAX_HEALTH_BASE,
    maxHealth: PLAYER_MAX_HEALTH_BASE,
    speed: PLAYER_SPEED_BASE,
    damage: PLAYER_DAMAGE_BASE,
    bulletSpeed: PROJECTILE_SPEED_BASE,
    shootCooldown: SHOOT_COOLDOWN_BASE,
    lastShot: 0,
    regen: PLAYER_REGEN_BASE,
    score: 0,
    coins: 0,
    upgrades: {
      damage: 0,
      bulletSpeed: 0,
      health: 0,
      regen: 0,
      reloadSpeed: 0,
    },
    angle: 0,
  };

  let bots = [];
  let projectiles = [];
  let coins = [];

  let cameraX = 0;
  let cameraY = 0;

  // --- Utils ---
  function distance(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }
  function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }
  function randomRange(min, max) {
    return Math.random() * (max - min) + min;
  }
  function angleBetween(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
  }

  // --- Create Bots ---
  function createBot() {
    return {
      id: crypto.randomUUID(),
      name: BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)],
      x: randomRange(BOT_RADIUS, MAP_WIDTH - BOT_RADIUS),
      y: randomRange(BOT_RADIUS, MAP_HEIGHT - BOT_RADIUS),
      radius: BOT_RADIUS,
      health: 100,
      maxHealth: 100,
      speed: BOT_SPEED,
      angle: Math.random() * Math.PI * 2,
      lastShot: 0,
      shootCooldown: BOT_SHOOT_COOLDOWN,
      damage: player.damage * 0.5, // Nerfed damage
      bulletSpeed: player.bulletSpeed * 0.75,
      sawAngle: 0,
      isDead: false,
    };
  }

  function spawnInitialBots() {
    bots = [];
    for (let i = 0; i < 10; i++) bots.push(createBot());
  }

  // --- Create Coins ---
  function createCoin(x, y, value = 1) {
    return {
      id: crypto.randomUUID(),
      x,
      y,
      radius: COIN_RADIUS,
      value,
      isChest: value > 1,
    };
  }

  function spawnInitialCoins() {
    coins = [];
    for (let i = 0; i < 20; i++) {
      coins.push(createCoin(randomRange(COIN_RADIUS, MAP_WIDTH - COIN_RADIUS), randomRange(COIN_RADIUS, MAP_HEIGHT - COIN_RADIUS), 1));
    }
    for (let i = 0; i < 5; i++) {
      const chestValue = CHEST_COINS[Math.floor(Math.random() * CHEST_COINS.length)];
      coins.push(createCoin(randomRange(COIN_RADIUS, MAP_WIDTH - COIN_RADIUS), randomRange(COIN_RADIUS, MAP_HEIGHT - COIN_RADIUS), chestValue));
    }
  }

  // --- Input ---
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'e') {
      autofire = !autofire;
      updateAutofireToggle();
      showPopupMessage(`Autofire turned ${autofire ? 'ON' : 'OFF'}`);
    }
  });
  window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
  });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mousePos.x = e.clientX - rect.left;
    mousePos.y = e.clientY - rect.top;
  });
  canvas.addEventListener('mousedown', e => {
    mouseDown = true;
  });
  canvas.addEventListener('mouseup', e => {
    mouseDown = false;
  });

  // --- Update Player ---
  function updatePlayer(dt) {
    let dx = 0, dy = 0;
    if (keys['w']) dy -= 1;
    if (keys['s']) dy += 1;
    if (keys['a']) dx -= 1;
    if (keys['d']) dx += 1;

    if (dx !== 0 || dy !== 0) {
      const len = Math.hypot(dx, dy);
      dx /= len;
      dy /= len;
    }

    player.x += dx * player.speed;
    player.y += dy * player.speed;

    player.x = clamp(player.x, player.radius, MAP_WIDTH - player.radius);
    player.y = clamp(player.y, player.radius, MAP_HEIGHT - player.radius);

    player.angle = angleBetween(player, { x: mousePos.x + cameraX, y: mousePos.y + cameraY });

    // Health regen
    player.health = Math.min(player.health + player.regen, player.maxHealth);
  }

  // --- Shoot projectile ---
  function shootProjectile(owner, x, y, angle, damage, speed) {
    projectiles.push({
      id: crypto.randomUUID(),
      owner,
      x,
      y,
      angle,
      damage,
      speed,
      radius: 6,
    });
  }

  // --- Update projectiles ---
  function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      p.x += Math.cos(p.angle) * p.speed;
      p.y += Math.sin(p.angle) * p.speed;

      if (p.x < 0 || p.x > MAP_WIDTH || p.y < 0 || p.y > MAP_HEIGHT) {
        projectiles.splice(i, 1);
        continue;
      }

      if (p.owner !== 'player') {
        if (distance(p, player) < player.radius + p.radius) {
          player.health -= p.damage;
          projectiles.splice(i, 1);
          if (player.health <= 0) {
            showPopupMessage("You Died! Refresh to play again.");
            gameRunning = false;
          }
          continue;
        }
      } else {
        let hit = false;
        for (let j = 0; j < bots.length; j++) {
          const bot = bots[j];
          if (bot.health <= 0) continue;
          if (distance(p, bot) < bot.radius + p.radius) {
            bot.health -= p.damage;
            if (bot.health <= 0) {
              player.score += 10;
              player.coins += bot.radius;
              const chestValue = Math.random() < 0.2 ? 25 : 1;
              coins.push(createCoin(bot.x, bot.y, chestValue));
              bots[j] = createBot();
            }
            projectiles.splice(i, 1);
            hit = true;
            break;
          }
        }
        if (hit) continue;
      }
    }
  }

  // --- Bot AI ---
  function updateBots(dt) {
    bots.forEach(bot => {
      if (bot.health <= 0) return;

      // Move toward player slowly
      const angleToPlayer = angleBetween(bot, player);
      bot.angle = angleToPlayer;
      bot.x += Math.cos(angleToPlayer) * bot.speed;
      bot.y += Math.sin(angleToPlayer) * bot.speed;

      bot.x = clamp(bot.x, bot.radius, MAP_WIDTH - bot.radius);
      bot.y = clamp(bot.y, bot.radius, MAP_HEIGHT - bot.radius);

      // Shoot at player if cooldown done
      if (performance.now() - bot.lastShot > bot.shootCooldown) {
        bot.lastShot = performance.now();
        shootProjectile('bot', bot.x + Math.cos(bot.angle) * (bot.radius + 8), bot.y + Math.sin(bot.angle) * (bot.radius + 8), bot.angle, bot.damage, bot.bulletSpeed);
      }

      // Saw blade rotation
      bot.sawAngle = (bot.sawAngle || 0) + 0.1;
    });
  }

  // --- Coins pickup ---
  function checkCoinPickups() {
    for (let i = coins.length - 1; i >= 0; i--) {
      const c = coins[i];
      if (distance(c, player) < c.radius + player.radius) {
        player.coins += c.value;
        coins.splice(i, 1);
      }
    }
  }

  // --- Camera ---
  function updateCamera() {
    cameraX = clamp(player.x - WIDTH / 2, 0, MAP_WIDTH - WIDTH);
    cameraY = clamp(player.y - HEIGHT / 2, 0, MAP_HEIGHT - HEIGHT);
  }

  // --- Drawing ---
  function drawMap() {
    ctx.fillStyle = '#111133';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    // Grid
    ctx.strokeStyle = '#223366';
    ctx.lineWidth = 1;
    for (let x = -cameraX % 100; x < WIDTH; x += 100) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, HEIGHT);
      ctx.stroke();
    }
    for (let y = -cameraY % 100; y < HEIGHT; y += 100) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(WIDTH, y);
      ctx.stroke();
    }
  }

  function drawPlayer() {
    const screenX = player.x - cameraX;
    const screenY = player.y - cameraY;

    ctx.save();
    ctx.translate(screenX, screenY);
    ctx.rotate(player.angle);

    // Body
    ctx.fillStyle = '#3498db';
    ctx.beginPath();
    ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(player.radius / 3, -player.radius / 3, player.radius / 6, 0, Math.PI * 2);
    ctx.arc(player.radius / 3, player.radius / 3, player.radius / 6, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = 'black';
    ctx.beginPath();
    ctx.arc(player.radius / 3 + 2, -player.radius / 3, player.radius / 10, 0, Math.PI * 2);
    ctx.arc(player.radius / 3 + 2, player.radius / 3, player.radius / 10, 0, Math.PI * 2);
    ctx.fill();

    // Saw blade ring
    ctx.strokeStyle = '#f39c12';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, player.radius + 8, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();

    // Health bar
    const barWidth = 60;
    const barHeight = 8;
    const healthRatio = player.health / player.maxHealth;
    ctx.fillStyle = 'black';
    ctx.fillRect(screenX - barWidth / 2, screenY + player.radius + 10, barWidth, barHeight);
    ctx.fillStyle = `rgb(${255 - healthRatio * 255},${healthRatio * 255},0)`;
    ctx.fillRect(screenX - barWidth / 2, screenY + player.radius + 10, barWidth * healthRatio, barHeight);
  }

  function drawBots() {
    bots.forEach(bot => {
      if (bot.health <= 0) return;

      const screenX = bot.x - cameraX;
      const screenY = bot.y - cameraY;

      ctx.save();
      ctx.translate(screenX, screenY);
      ctx.rotate(bot.angle);

      // Body
      ctx.fillStyle = '#e67e22';
      ctx.beginPath();
      ctx.arc(0, 0, bot.radius, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(bot.radius / 3, -bot.radius / 3, bot.radius / 6, 0, Math.PI * 2);
      ctx.arc(bot.radius / 3, bot.radius / 3, bot.radius / 6, 0, Math.PI * 2);
      ctx.fill();

      // Pupils
      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(bot.radius / 3 + 2, -bot.radius / 3, bot.radius / 10, 0, Math.PI * 2);
      ctx.arc(bot.radius / 3 + 2, bot.radius / 3, bot.radius / 10, 0, Math.PI * 2);
      ctx.fill();

      // Name label
      ctx.fillStyle = 'white';
      ctx.font = '16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(bot.name, 0, -bot.radius - 12);

      // Saw blade rotating
      ctx.strokeStyle = '#f39c12';
      ctx.lineWidth = 3;
      ctx.beginPath();
      const sawRadius = bot.radius + 8;
      const sawCount = 12;
      for (let i = 0; i < sawCount; i++) {
        const angle = i * (Math.PI * 2 / sawCount) + (bot.sawAngle || 0);
        const x = Math.cos(angle) * sawRadius;
        const y = Math.sin(angle) * sawRadius;
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();

      ctx.restore();

      // Health bar
      const barWidth = 50;
      const barHeight = 6;
      const healthRatio = bot.health / bot.maxHealth;
      ctx.fillStyle = 'black';
      ctx.fillRect(screenX - barWidth / 2, screenY + bot.radius + 8, barWidth, barHeight);
      ctx.fillStyle = `rgb(${255 - healthRatio * 255},${healthRatio * 255},0)`;
      ctx.fillRect(screenX - barWidth / 2, screenY + bot.radius + 8, barWidth * healthRatio, barHeight);
    });
  }

  function drawProjectiles() {
    projectiles.forEach(p => {
      const screenX = p.x - cameraX;
      const screenY = p.y - cameraY;
      ctx.save();
      ctx.translate(screenX, screenY);
      ctx.rotate(p.angle);
      ctx.fillStyle = '#00ffff';
      ctx.beginPath();
      ctx.rect(-p.radius / 2, -p.radius / 2, p.radius * 2, p.radius);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawCoins() {
    coins.forEach(c => {
      const screenX = c.x - cameraX;
      const screenY = c.y - cameraY;
      ctx.fillStyle = c.isChest ? '#ffcc00' : '#ffff55';
      ctx.beginPath();
      ctx.arc(screenX, screenY, c.radius, 0, Math.PI * 2);
      ctx.fill();

      if (c.isChest) {
        ctx.strokeStyle = '#aa8800';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    });
  }

  // --- Minimap ---
  const minimap = document.getElementById('minimap');
  const minimapWidth = minimap.clientWidth;
  const minimapHeight = minimap.clientHeight;
  const mmCtx = minimap.getContext('2d');

  function drawMinimap() {
    mmCtx.clearRect(0, 0, minimapWidth, minimapHeight);

    // Background
    mmCtx.fillStyle = 'rgba(0,0,0,0.7)';
    mmCtx.fillRect(0, 0, minimapWidth, minimapHeight);

    // Scale ratios
    const scaleX = minimapWidth / MAP_WIDTH;
    const scaleY = minimapHeight / MAP_HEIGHT;

    // Draw coins
    coins.forEach(c => {
      mmCtx.fillStyle = c.isChest ? '#ffcc00' : '#ffff55';
      mmCtx.beginPath();
      mmCtx.arc(c.x * scaleX, c.y * scaleY, 3, 0, Math.PI * 2);
      mmCtx.fill();
    });

    // Draw bots
    bots.forEach(bot => {
      mmCtx.fillStyle = 'orange';
      mmCtx.beginPath();
      mmCtx.arc(bot.x * scaleX, bot.y * scaleY, 4, 0, Math.PI * 2);
      mmCtx.fill();
    });

    // Draw player
    mmCtx.fillStyle = '#3498db';
    mmCtx.beginPath();
    mmCtx.arc(player.x * scaleX, player.y * scaleY, 5, 0, Math.PI * 2);
    mmCtx.fill();

    // Outline player radius
    mmCtx.strokeStyle = 'white';
    mmCtx.lineWidth = 1;
    mmCtx.beginPath();
    mmCtx.arc(player.x * scaleX, player.y * scaleY, 6, 0, Math.PI * 2);
    mmCtx.stroke();
  }

  // --- UI DOM elements ---
  const leaderboardUL = document.querySelector('#leaderboard ul');
  const buyButtons = document.querySelectorAll('#upgradesPanel .buyBtn');
  const coinsDisplay = document.getElementById('coinsDisplay');
  const autofireToggle = document.getElementById('autofireToggle');

  // --- Upgrades UI update ---
  function updateUpgradesUI() {
    buyButtons.forEach(btn => {
      const type = btn.parentElement.dataset.upgrade;
      const valSpan = btn.parentElement.querySelector('.value');
      if (type === 'damage') valSpan.textContent = player.damage.toFixed(0);
      else if (type === 'bulletSpeed') valSpan.textContent = player.bulletSpeed.toFixed(0);
      else if (type === 'health') valSpan.textContent = player.maxHealth.toFixed(0);
      else if (type === 'regen') valSpan.textContent = player.regen.toFixed(3);
      else if (type === 'reloadSpeed') valSpan.textContent = `${player.shootCooldown} ms`;
    });
  }
  function buyUpgrade(type) {
    const cost = UPGRADE_COSTS[type];
    if (player.coins < cost) {
      showPopupMessage(`Not enough coins to buy ${type}!`);
      return;
    }
    player.coins -= cost;
    player.upgrades[type]++;
    if (type === 'damage') player.damage += 2;
    else if (type === 'bulletSpeed') player.bulletSpeed += 2;
    else if (type === 'health') {
      player.maxHealth += 20;
      player.health += 20;
    }
    else if (type === 'regen') player.regen += 0.005;
    else if (type === 'reloadSpeed') player.shootCooldown = Math.max(50, player.shootCooldown - 30);
    updateUpgradesUI();
    updateCoinsDisplay();
  }
  buyButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.parentElement.dataset.upgrade;
      buyUpgrade(type);
    });
  });

  // --- Leaderboard update ---
  function updateLeaderboard() {
    const entries = [{ name: player.name || 'You', score: player.score, coins: player.coins }];
    bots.forEach(bot => {
      entries.push({ name: bot.name, score: Math.round(bot.health), coins: 0 });
    });
    entries.sort((a, b) => b.score - a.score);
    const top = entries.slice(0, 5);

    leaderboardUL.innerHTML = '';
    top.forEach(entry => {
      const li = document.createElement('li');
      li.textContent = entry.name;
      const spanScore = document.createElement('span');
      spanScore.textContent = `Score: ${entry.score} | Coins: ${entry.coins}`;
      li.appendChild(spanScore);
      leaderboardUL.appendChild(li);
    });
  }

  // --- Coins display update ---
  function updateCoinsDisplay() {
    coinsDisplay.textContent = `Coins: ${player.coins}`;
  }
  // --- Autofire toggle UI ---
  function updateAutofireToggle() {
    autofireToggle.textContent = `Autofire: ${autofire ? 'ON' : 'OFF'} (Press E)`;
    autofireToggle.style.color = autofire ? '#55ff55' : '#ff5555';
  }

  // --- In-game popup message ---
  const popupMessage = document.getElementById('popupMessage');
  const popupText = document.getElementById('popupText');
  const popupCloseBtn = popupMessage.querySelector('.closeBtn');
  let popupTimeout;

  function showPopupMessage(msg, duration = 4000) {
    popupText.textContent = msg;
    popupMessage.classList.add('show');

    if (popupTimeout) clearTimeout(popupTimeout);
    popupTimeout = setTimeout(() => {
      popupMessage.classList.remove('show');
    }, duration);
  }
  popupCloseBtn.addEventListener('click', () => {
    popupMessage.classList.remove('show');
    if (popupTimeout) clearTimeout(popupTimeout);
  });

  // --- Camera update ---
  function updateCamera() {
    cameraX = clamp(player.x - WIDTH / 2, 0, MAP_WIDTH - WIDTH);
    cameraY = clamp(player.y - HEIGHT / 2, 0, MAP_HEIGHT - HEIGHT);
  }

  // --- Game loop ---
  let lastTime = 0;
  function gameLoop(timestamp) {
    if (!gameRunning) return;
    const dt = (timestamp - lastTime) / 1000 || 0;
    lastTime = timestamp;

    updatePlayer(dt);
    updateBots(dt);
    updateProjectiles(dt);
    checkCoinPickups();
    if (autofire && (timestamp - player.lastShot) > player.shootCooldown) {
      player.lastShot = timestamp;
      shootProjectile(
        'player',
        player.x + Math.cos(player.angle) * (player.radius + 8),
        player.y + Math.sin(player.angle) * (player.radius + 8),
        player.angle,
        player.damage,
        player.bulletSpeed
      );
    }
    updateCamera();

    // Drawing
    drawMap();
    drawCoins();
    drawBots();
    drawPlayer();
    drawProjectiles();
    updateLeaderboard();
    updateCoinsDisplay();
    updateAutofireToggle();
    drawMinimap();

    requestAnimationFrame(gameLoop);
  }

  // --- Main menu ---
  const mainMenu = document.getElementById('mainMenu');
  const playerNameInput = document.getElementById('playerNameInput');
  const startGameBtn = document.getElementById('startGameBtn');

  startGameBtn.addEventListener('click', () => {
    const name = playerNameInput.value.trim();
    if (name.length < 2) {
      showPopupMessage("Name must be at least 2 characters.");
      return;
    }
    player.name = name.slice(0, 15);
    mainMenu.style.display = 'none';
    resetGame();
    gameRunning = true;
    requestAnimationFrame(gameLoop);
  });

  // --- Reset game ---
  function resetGame() {
    player.x = MAP_WIDTH / 2;
    player.y = MAP_HEIGHT / 2;
    player.health = player.maxHealth;
    player.score = 0;
    player.coins = 0;
    player.upgrades = {
      damage: 0,
      bulletSpeed: 0,
      health: 0,
      regen: 0,
      reloadSpeed: 0,
    };
    player.damage = PLAYER_DAMAGE_BASE;
    player.bulletSpeed = PROJECTILE_SPEED_BASE;
    player.shootCooldown = SHOOT_COOLDOWN_BASE;
    player.regen = PLAYER_REGEN_BASE;
    spawnInitialBots();
    spawnInitialCoins();
    updateUpgradesUI();
    updateCoinsDisplay();
    updateAutofireToggle();
  }

  // --- Start with main menu shown ---
  mainMenu.style.display = 'flex';
  updateAutofireToggle();

})();
</script>

</body>
</html>
