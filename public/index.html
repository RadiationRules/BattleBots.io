<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>BattleBots.io 3D Edition</title>
  <link rel="stylesheet" href="style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <script defer src="client.js"></script>
</head>
<body>

  <!-- Main Menu -->
  <div id="main-menu" class="menu">
    <h1>BattleBots.io</h1>
    <input id="playerNameInput" type="text" placeholder="Enter your name" maxlength="15" />
    
    <div class="mode-selection">
      <label><input type="radio" name="mode" value="free" checked /> Free-for-All</label>
      <label><input type="radio" name="mode" value="teams" /> Teams (Red vs Blue)</label>
    </div>
    
    <button id="startGameBtn" class="btn-primary">Play</button>

    <div class="credits">Made with ⚙️ and ❤️ by YourName</div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="scoreCoins">
      <div>Score: <span id="score">0</span></div>
      <div>Coins: <span id="coins">0</span></div>
      <div id="teamScore">Team Score: -</div>
    </div>
    <button id="toggleUpgrades" class="btn-secondary">Upgrades ⚙️</button>
    <button id="toggleChatBtn" class="btn-secondary">Chat 💬</button>
  </div>

  <!-- Upgrades Panel -->
  <div id="upgradesPanel" class="panel hidden">
    <h2>Upgrades</h2>
    <ul>
      <li>Damage <button data-upgrade="damage" class="upgradeBtn">Upgrade</button></li>
      <li>Reload Speed <button data-upgrade="reload" class="upgradeBtn">Upgrade</button></li>
      <li>Max Health <button data-upgrade="health" class="upgradeBtn">Upgrade</button></li>
      <li>Health Regen <button data-upgrade="regen" class="upgradeBtn">Upgrade</button></li>
      <li>Coin Bonus <button data-upgrade="coinBonus" class="upgradeBtn">Upgrade</button></li>
    </ul>
    <button id="closeUpgrades" class="btn-primary">Close</button>
  </div>

  <!-- Chat Box -->
  <div id="chatContainer" class="panel chat-panel hidden">
    <div id="chatMessages" class="chat-messages"></div>
    <input id="chatInput" type="text" maxlength="100" placeholder="Type your message and press Enter" />
  </div>

  <!-- Game Canvas -->
  <canvas id="gameCanvas"></canvas>

</body>
</html>
